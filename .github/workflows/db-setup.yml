name: Database Setup

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/**
    paths:
      - '.github/workflows/db-setup.yml'
      - 'src/server/db/**'
      - 'drizzle.config.ts'

jobs:
  db-setup:
    name: Push Schema & Seed Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Push schema to database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL not found in secrets" && exit 1
          fi
          pnpm db:push

      - name: Seed database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:seed

      - name: Success
        run: |
          echo "### Database setup completed" >> $GITHUB_STEP_SUMMARY
          echo "- Schema pushed (includes achievements, missions, payments tables)" >> $GITHUB_STEP_SUMMARY
          echo "- Seed data loaded:" >> $GITHUB_STEP_SUMMARY
          echo "  - 43 sports" >> $GITHUB_STEP_SUMMARY
          echo "  - 55+ achievements (all 10 personas)" >> $GITHUB_STEP_SUMMARY
          echo "  - 16+ missions (daily + weekly)" >> $GITHUB_STEP_SUMMARY
