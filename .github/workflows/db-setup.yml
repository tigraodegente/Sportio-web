name: Database Setup

on:
  workflow_dispatch:
  push:
    branches:
      - claude/**
    paths:
      - '.github/workflows/db-setup.yml'
      - 'src/server/db/**'
      - 'drizzle.config.ts'

jobs:
  db-setup:
    name: Push Schema & Seed Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Push schema to database
        run: pnpm db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed database
        run: pnpm db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Success
        run: echo "Database setup completed successfully!"
