name: Database Setup

on:
  workflow_dispatch:
  push:
    branches:
      - claude/**
    paths:
      - '.github/workflows/db-setup.yml'
      - 'src/server/db/**'
      - 'drizzle.config.ts'

jobs:
  db-setup:
    name: Push Schema & Seed Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Load environment variables
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          elif [ -f .env ]; then
            grep -E '^DATABASE_URL=' .env >> $GITHUB_ENV
            echo "Loaded DATABASE_URL from .env file"
          else
            echo "ERROR: DATABASE_URL not found" && exit 1
          fi

      - name: Push schema to database
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Success
        run: echo "Database setup completed successfully!"
