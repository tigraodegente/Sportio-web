name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Run database migration before deploy
  db-migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Push schema to database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:push

      - name: Seed database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:seed
        continue-on-error: true

  deploy-preview:
    name: Deploy Preview (Vercel)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync Environment Variables to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          declare -A ENV_VARS
          ENV_VARS[DATABASE_URL]="${{ secrets.DATABASE_URL }}"
          ENV_VARS[AUTH_SECRET]="${{ secrets.AUTH_SECRET }}"
          ENV_VARS[GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
          ENV_VARS[NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY]="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"

          for key in "${!ENV_VARS[@]}"; do
            value="${ENV_VARS[$key]}"
            if [ -n "$value" ]; then
              echo "$value" | vercel env rm "$key" preview --yes --token=$VERCEL_TOKEN 2>/dev/null || true
              echo "$value" | vercel env add "$key" preview --token=$VERCEL_TOKEN 2>/dev/null || true
              echo "✓ Set $key"
            fi
          done

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "### Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $url" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to: ${{ steps.deploy.outputs.url }}`
            })

  deploy-web:
    name: Deploy Web (Vercel)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: db-migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync Environment Variables to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Sync essential env vars from GitHub Secrets to Vercel project
          declare -A ENV_VARS
          ENV_VARS[DATABASE_URL]="${{ secrets.DATABASE_URL }}"
          ENV_VARS[AUTH_SECRET]="${{ secrets.AUTH_SECRET }}"
          ENV_VARS[GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
          ENV_VARS[NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY]="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"

          for key in "${!ENV_VARS[@]}"; do
            value="${ENV_VARS[$key]}"
            if [ -n "$value" ]; then
              # Remove existing and re-add (vercel env add fails if already exists)
              echo "$value" | vercel env rm "$key" production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
              echo "$value" | vercel env add "$key" production --token=$VERCEL_TOKEN 2>/dev/null || true
              echo "✓ Set $key"
            fi
          done

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: deploy-prod
        shell: bash --noprofile --norc -o pipefail {0}
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            output=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} 2>&1) && exit_code=0 || exit_code=$?
            url=$(echo "$output" | grep -oE 'https://[^ ]+' | tail -1)
            if [ $exit_code -eq 0 ] && [ -n "$url" ]; then
              echo "url=$url" >> $GITHUB_OUTPUT
              echo "### Production Deployed" >> $GITHUB_STEP_SUMMARY
              echo "**URL:** $url" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Attempt $attempt failed:"
            echo "$output"
            if echo "$output" | grep -q "Too many requests"; then
              echo "Rate limited. Waiting before retry..."
              sleep $((60 * attempt))
            else
              sleep $((10 * attempt))
            fi
          done
          echo "All deploy attempts failed"
          exit 1

  deploy-mobile:
    name: Build Mobile (EAS)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') &&
      contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd apps/mobile && npm ci

      - name: Build for all platforms
        run: cd apps/mobile && eas build --platform all --profile preview --non-interactive
